<div class="wrapper" [class.dark]="isDark" [class.light]="!isDark">
  <div class="orb-1"></div>
  <div class="orb-2"></div>

  <button class="theme-toggle" (click)="toggleTheme()">
    {{ isDark ? '☀️' : '🌙' }}
  </button>

  <div class="card" [class.dark]="isDark" [class.light]="!isDark">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">CHAINFOLIO</span>
    </div>

    <h1 class="title">Welcome <span class="accent">Back</span></h1>
    <p class="subtitle">Sign in to continue tracking your assets</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="field">
        <mat-label>Username</mat-label>
        <mat-error *ngIf="loginForm.get('username')?.hasError('required')">Username is required</mat-error>
        <input matInput formControlName="username" type="username" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="field">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" />
        <button matSuffix type="button" class="toggle-btn" (click)="togglePassword()">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
      </mat-form-field>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button mat-flat-button class="btn-primary" type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="switch">Don't have an account? <a routerLink="/signup" class="accent">Sign Up</a></p>
  </div>
</div>
